name: Deploy ECS Fargate

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET }}
        aws-region: ap-south-1

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker
      run: |
        cd app
        docker build -t assignment-app .

    - name: Tag image
      run: |
        docker tag assignment-app:latest 735266088962.dkr.ecr.ap-south-1.amazonaws.com/assignment-app:latest

    - name: Push image
      run: |
        docker push 735266088962.dkr.ecr.ap-south-1.amazonaws.com/assignment-app:latest

    - name: Deploy ECS
      run: |
        aws ecs update-service \
          --cluster assignment-cluster \
          --service assignment-service \
          --force-new-deployment
